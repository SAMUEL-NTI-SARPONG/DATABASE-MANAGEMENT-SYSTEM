<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPA Records Entries System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/epa%20logo.png" />
    <meta name="theme-color" content="#007acc" />
    <meta
      name="description"
      content="Environmental Protection Agency — Records Entries Management System"
    />
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-box">
        <img
          src="/epa%20logo.png"
          alt="EPA Logo"
          class="login-logo-img"
          onerror="this.outerHTML = '<div class=login-logo>🌿</div>'"
        />
        <h1>EPA Records Entries System</h1>
        <p class="login-subtitle">Environmental Protection Agency</p>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="login-user">Username</label>
            <input
              type="text"
              id="login-user"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="login-pass">Password</label>
            <input
              type="password"
              id="login-pass"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Sign In
          </button>
          <div id="login-error" class="error-msg" style="display: none"></div>
        </form>
        <p class="login-version">v1.0</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app" style="display: none">
      <!-- Activity Bar -->
      <div class="activity-bar">
        <div class="activity-top">
          <button
            class="activity-btn mobile-menu-btn"
            onclick="openMobileSidebar()"
            title="Menu"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <!-- Dashboard (Records Analytics) -->
          <button
            class="activity-btn active"
            data-view="dashboard"
            title="Dashboard"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
              />
            </svg>
          </button>
          <!-- Records Entries -->
          <button
            class="activity-btn"
            data-view="records"
            title="Records Entries"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-4H6v-2h12v2z"
              />
            </svg>
          </button>
          <!-- User Management (admin only, shown via JS) -->
          <button
            class="activity-btn"
            data-view="users"
            title="User Management"
            id="users-nav-btn"
            style="display: none"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
              />
            </svg>
          </button>
        </div>
        <div class="activity-bottom">
          <button class="activity-btn" data-view="settings" title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" id="sidebar-title">DASHBOARD</span>
          <button
            class="sidebar-close-btn"
            onclick="closeMobileSidebar()"
            title="Close"
          >
            ✕
          </button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
      </div>

      <!-- Mobile sidebar overlay -->
      <div class="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>

      <!-- Main Content -->
      <div class="main-area">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="content" id="content"></div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <div class="status-left">
          <span id="status-user"></span>
          <span id="status-role" class="badge"></span>
        </div>
        <div class="status-right">
          <button
            class="status-btn"
            id="theme-toggle-btn"
            title="Toggle Light/Dark Theme"
            onclick="toggleTheme()"
          >
            🌙
          </button>
          <span id="status-info">EPA Records Entries System v1.0</span>
          <button class="status-btn" id="logout-btn" title="Sign Out">
            Sign Out
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
