<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPA Database System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/epa%20logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/epa%20logo.png" />
    <meta name="theme-color" content="#007acc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="EPA Database" />
    <meta
      name="description"
      content="Environmental Protection Agency Database Management System"
    />
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-box">
        <img
          src="/epa%20logo.png"
          alt="EPA Logo"
          class="login-logo-img"
          onerror="this.outerHTML = '<div class=login-logo>🌿</div>'"
        />
        <h1>EPA Database System</h1>
        <p class="login-subtitle">Environmental Protection Agency</p>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="login-user">Username</label>
            <input
              type="text"
              id="login-user"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="login-pass">Password</label>
            <input
              type="password"
              id="login-pass"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Sign In
          </button>
          <div id="login-error" class="error-msg" style="display: none"></div>
        </form>
        <p class="login-version">v5.5.0</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app" style="display: none">
      <!-- Activity Bar -->
      <div class="activity-bar">
        <div class="activity-top">
          <button
            class="activity-btn mobile-menu-btn"
            onclick="openMobileSidebar()"
            title="Menu"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <button
            class="activity-btn active"
            data-view="dashboard"
            title="Dashboard"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
              />
            </svg>
          </button>
          <button class="activity-btn" data-view="tables" title="Data Tables">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 3v18h18V3H3zm8 16H5v-6h6v6zm0-8H5V5h6v6zm8 8h-6v-6h6v6zm0-8h-6V5h6v6z"
              />
            </svg>
          </button>
          <button class="activity-btn" data-view="queries" title="Queries">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
          </button>
          <button class="activity-btn" data-view="forms" title="Forms">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"
              />
            </svg>
          </button>
          <button class="activity-btn" data-view="reports" title="Reports">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"
              />
            </svg>
          </button>
          <button class="activity-btn" data-view="scanlog" title="Scan Log">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"
              />
            </svg>
          </button>
          <button
            class="activity-btn"
            data-view="permitfilter"
            title="Permit Filter &amp; Export"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" />
            </svg>
          </button>
          <button
            class="activity-btn"
            data-view="enrichment"
            title="Data Enrichment"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM9 13h6v2H9v-2zm0 4h6v2H9v-2zm0-8h2v2H9V9z"
              />
              <circle cx="18" cy="18" r="5" fill="var(--bg-primary)" />
              <path
                d="M18 15v3h-3v2h3v3h2v-3h3v-2h-3v-3h-2z"
                fill="currentColor"
              />
            </svg>
          </button>
          <!-- Records Entries and Records Analytics buttons commented out
          <button
            class="activity-btn"
            data-view="records"
            title="Records Entries"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-4H6v-2h12v2z"
              />
            </svg>
          </button>
          <button
            class="activity-btn"
            data-view="recordsAnalytics"
            title="Records Analytics"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"
              />
              <path d="M21 18H3v2h18v-2z" opacity=".5" />
            </svg>
          </button>
          -->
          <button
            class="activity-btn"
            data-view="activity"
            title="Activity Log"
            id="activity-nav-btn"
            style="display: none"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"
              />
            </svg>
          </button>
          <button
            class="activity-btn"
            data-view="users"
            title="User Management"
            id="users-nav-btn"
            style="display: none"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
              />
            </svg>
          </button>
        </div>
        <div class="activity-bottom">
          <button class="activity-btn" data-view="settings" title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" id="sidebar-title">DASHBOARD</span>
          <button
            class="sidebar-close-btn"
            onclick="closeMobileSidebar()"
            title="Close"
          >
            ✕
          </button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
      </div>

      <!-- Mobile sidebar overlay -->
      <div class="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>

      <!-- Main Content -->
      <div class="main-area">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="content" id="content"></div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <div class="status-left">
          <span id="status-user"></span>
          <span id="status-role" class="badge"></span>
        </div>
        <div class="status-right">
          <button
            class="status-btn"
            id="theme-toggle-btn"
            title="Toggle Light/Dark Theme"
            onclick="toggleTheme()"
          >
            🌙
          </button>
          <span id="status-info">EPA Database System v4.0</span>
          <button class="status-btn" id="logout-btn" title="Sign Out">
            Sign Out
          </button>
        </div>
      </div>
    </div>

    <script src="/xlsx.full.min.js"></script>
    <script src="/app.js"></script>
    <script>
      // Register Service Worker for PWA (phone install)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
